<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nikki">
<meta name="theme-color" content="#E8E4DD">
<title>Nikki · 日記</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap');

/* ════════════════════════════════════════
THEME: NEO-TACTILE NATURE
Sage · Lavender · Cream · Glass
════════════════════════════════════════ */

:root {
/* Surface system — layered depth */
–surf-0: #E8E4DD;
–surf-1: #EFECE6;
–surf-2: #F6F4F0;
–surf-3: #FDFCFA;

/* Neumorphic shadows */
–neo-up: 6px 6px 16px rgba(166, 160, 148, 0.35), -6px -6px 16px rgba(255, 255, 255, 0.8);
–neo-up-sm: 3px 3px 8px rgba(166, 160, 148, 0.3), -3px -3px 8px rgba(255, 255, 255, 0.7);
–neo-down: inset 3px 3px 8px rgba(166, 160, 148, 0.3), inset -3px -3px 8px rgba(255, 255, 255, 0.7);
–neo-flat: 0 2px 8px rgba(166, 160, 148, 0.15);

/* Color palette — muted sage/lavender */
–sage: #8BA693;
–sage-deep: #6B8F76;
–sage-soft: rgba(139, 166, 147, 0.15);
–sage-glow: rgba(139, 166, 147, 0.25);

–lavender: #A69ABD;
–lavender-soft: rgba(166, 154, 189, 0.15);

–cream-accent: #C4A87D;
–cream-soft: rgba(196, 168, 125, 0.12);

–rose: #C48B8B;
–rose-soft: rgba(196, 139, 139, 0.12);

/* Text */
–text-1: #3D3930;
–text-2: #7D776D;
–text-3: #AAA49A;
–text-inv: #FDFCFA;

/* Glass */
–glass: rgba(239, 236, 230, 0.7);
–glass-border: rgba(255, 255, 255, 0.5);
–glass-heavy: rgba(239, 236, 230, 0.92);

/* Radii */
–r-xs: 12px; –r-sm: 16px; –r-md: 24px; –r-lg: 32px; –r-pill: 100px;

/* Fonts */
–f-display: ‘Fraunces’, ‘Noto Serif JP’, serif;
–f-body: ‘Outfit’, sans-serif;
–f-jp: ‘Noto Serif JP’, serif;

/* Motion */
–ease: cubic-bezier(0.16, 1, 0.3, 1);
–spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme=“dark”] {
–surf-0: #1A1D1E;
–surf-1: #222628;
–surf-2: #2A2F32;
–surf-3: #343A3D;

–neo-up: 6px 6px 18px rgba(0, 0, 0, 0.5), -6px -6px 18px rgba(60, 66, 70, 0.25);
–neo-up-sm: 3px 3px 10px rgba(0, 0, 0, 0.45), -3px -3px 10px rgba(60, 66, 70, 0.2);
–neo-down: inset 3px 3px 10px rgba(0, 0, 0, 0.45), inset -3px -3px 10px rgba(60, 66, 70, 0.15);
–neo-flat: 0 2px 8px rgba(0, 0, 0, 0.3);

–sage: #7DB88A;
–sage-deep: #5EA06E;
–sage-soft: rgba(125, 184, 138, 0.12);
–sage-glow: rgba(125, 184, 138, 0.2);

–lavender: #B0A3CF;
–lavender-soft: rgba(176, 163, 207, 0.12);

–cream-accent: #D4B88A;
–cream-soft: rgba(212, 184, 138, 0.1);

–rose: #D49A9A;
–rose-soft: rgba(212, 154, 154, 0.1);

–text-1: #E2DED6;
–text-2: #8A857D;
–text-3: #5C5850;
–text-inv: #1A1D1E;

–glass: rgba(30, 34, 36, 0.75);
–glass-border: rgba(255, 255, 255, 0.06);
–glass-heavy: rgba(26, 29, 30, 0.94);
}

/* ─── RESET ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
height: 100%; display: flex; flex-direction: column;
background: var(–surf-0); color: var(–text-1);
font-family: var(–f-body); overflow: hidden;
-webkit-font-smoothing: antialiased;
transition: background-color 0.5s var(–ease), color 0.5s var(–ease);
padding-top: env(safe-area-inset-top);
}
button { border: none; background: none; font-family: inherit; cursor: pointer; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }

/* ─── GRAIN TEXTURE OVERLAY ─── */
body::after {
content: ‘’; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
opacity: 0.025;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
}

/* ─── MAIN SCROLL ─── */
.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(100px + env(safe-area-inset-bottom)); }

/* ════════════════════════════════════════
HOME VIEW
════════════════════════════════════════ */

.hero { padding: 44px 24px 0; }

.hero-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
.hero-text { display: flex; flex-direction: column; gap: 2px; }
.hero-sub { font-size: 0.78rem; font-weight: 600; color: var(–text-3); letter-spacing: 0.05em; text-transform: uppercase; }
.hero-h { font-family: var(–f-display); font-size: 1.9rem; font-weight: 700; color: var(–text-1); line-height: 1.15; }

/* Neo-tactile icon button */
.neo-btn {
width: 48px; height: 48px; border-radius: 16px;
background: var(–surf-1);
box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–text-2);
transition: all 0.15s ease;
}
.neo-btn:active { box-shadow: var(–neo-down); transform: scale(0.96); }

/* ─── HERO CARD (glassmorphic landscape) ─── */
.hero-card {
border-radius: var(–r-lg);
padding: 2px;
background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(255,255,255,0.1));
margin-bottom: 36px;
position: relative;
}
[data-theme=“dark”] .hero-card {
background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
}
.hero-card-inner {
border-radius: 30px; overflow: hidden; position: relative;
aspect-ratio: 2;
background: linear-gradient(160deg, #C8D5C0 0%, #A7BEA0 30%, #8BAF80 60%, #6B9A70 100%);
}
[data-theme=“dark”] .hero-card-inner {
background: linear-gradient(160deg, #1E332A 0%, #1A2E24 30%, #16281F 60%, #12221B 100%);
}
.hero-card-inner svg { width: 100%; height: 100%; position: absolute; inset: 0; }

.hero-pill {
position: absolute; top: 14px; left: 14px;
background: var(–glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
border: 1px solid var(–glass-border);
padding: 7px 16px; border-radius: var(–r-pill);
font-size: 0.72rem; font-weight: 600; color: var(–text-1);
box-shadow: var(–neo-flat);
}
.hero-kanji {
position: absolute; bottom: 14px; right: 18px;
font-family: var(–f-jp); font-size: 2.6rem; font-weight: 600;
color: rgba(255,255,255,0.2); line-height: 1; pointer-events: none;
}
[data-theme=“dark”] .hero-kanji { color: rgba(255,255,255,0.07); }

/* ─── SECTION HEADING ─── */
.sec-head { display: flex; justify-content: space-between; align-items: baseline; padding: 0 24px; margin-bottom: 18px; }
.sec-head h2 { font-family: var(–f-display); font-size: 1.35rem; font-weight: 700; }
.sec-head .badge {
font-size: 0.7rem; font-weight: 700; padding: 5px 12px;
border-radius: var(–r-pill); background: var(–sage-soft); color: var(–sage);
}

/* ─── BENTO GRID ─── */
.bento { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 24px 32px; }

.b-card {
background: var(–surf-1);
border-radius: var(–r-lg);
padding: 20px 18px;
display: flex; flex-direction: column;
justify-content: space-between;
aspect-ratio: 0.88;
box-shadow: var(–neo-up);
cursor: pointer;
position: relative;
overflow: hidden;
transition: box-shadow 0.2s, transform 0.2s var(–ease);
}
.b-card:active { box-shadow: var(–neo-down); transform: scale(0.97); }

/* Soft colored glow behind icon */
.b-glow {
position: absolute; top: -10px; right: -10px;
width: 90px; height: 90px; border-radius: 50%;
filter: blur(35px); opacity: 0.4; pointer-events: none;
}
.b-glow.g-sage { background: var(–sage); }
.b-glow.g-lav { background: var(–lavender); }
.b-glow.g-cream { background: var(–cream-accent); }
.b-glow.g-rose { background: var(–rose); }

.b-ico {
width: 48px; height: 48px; border-radius: 16px;
background: var(–surf-2);
box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–sage); position: relative; z-index: 1;
margin-bottom: auto;
}
.b-info { position: relative; z-index: 1; }
.b-name { font-family: var(–f-display); font-size: 1.05rem; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
.b-meta { font-size: 0.7rem; font-weight: 600; color: var(–text-3); }

/* ─── EMPTY STATE ─── */
.empty { display: flex; flex-direction: column; align-items: center; padding: 52px 28px; text-align: center; }
.empty-ico {
width: 72px; height: 72px; border-radius: 24px;
background: var(–surf-1); box-shadow: var(–neo-up);
display: flex; align-items: center; justify-content: center;
color: var(–sage); margin-bottom: 20px;
}
.empty h3 { font-family: var(–f-display); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.empty p { font-size: 0.88rem; color: var(–text-2); line-height: 1.5; max-width: 240px; }

/* ════════════════════════════════════════
INNER VIEWS — Topic & Timeline
════════════════════════════════════════ */

.v-bar {
display: flex; align-items: center; justify-content: space-between;
padding: 28px 24px 12px;
position: sticky; top: 0; z-index: 20;
background: var(–glass-heavy); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
transition: background-color 0.5s;
}
.v-back {
width: 44px; height: 44px; border-radius: 14px;
background: var(–surf-1); box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–text-2); transition: all 0.15s;
}
.v-back:active { box-shadow: var(–neo-down); transform: scale(0.92); }
.v-title { font-family: var(–f-display); font-size: 1.2rem; font-weight: 700; }
.v-action { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(–text-3); }

/* ─── TABS (pill, neumorphic) ─── */
.tabs { display: flex; gap: 10px; padding: 4px 24px 20px; overflow-x: auto; scrollbar-width: none; }
.tab {
padding: 10px 20px; border-radius: var(–r-pill);
font-size: 0.8rem; font-weight: 600; white-space: nowrap;
background: var(–surf-1); color: var(–text-2);
box-shadow: var(–neo-up-sm);
transition: all 0.2s;
}
.tab.on {
background: var(–sage);
color: var(–text-inv);
box-shadow: 3px 3px 10px rgba(107, 154, 118, 0.35), -2px -2px 8px rgba(139, 175, 160, 0.2);
}
.tab:active { box-shadow: var(–neo-down); }

/* ─── ENTRY CARDS ─── */
.entries { display: flex; flex-direction: column; gap: 16px; padding: 0 24px 28px; }

.e-card {
background: var(–surf-1);
border-radius: var(–r-lg);
box-shadow: var(–neo-up);
overflow: hidden; cursor: pointer;
transition: all 0.2s var(–ease);
}
.e-card:active { box-shadow: var(–neo-down); transform: scale(0.98); }

.e-img {
width: 100%; height: 200px; object-fit: cover; display: block;
background: var(–surf-2);
}
.e-body { padding: 18px 20px; }
.e-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.e-date { font-size: 0.76rem; font-weight: 600; color: var(–text-2); }
.e-tag {
font-size: 0.65rem; font-weight: 700; padding: 5px 12px;
border-radius: var(–r-pill);
background: var(–lavender-soft); color: var(–lavender);
text-transform: uppercase; letter-spacing: 0.06em;
}
.e-text {
font-size: 0.92rem; line-height: 1.6; color: var(–text-2);
display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* ════════════════════════════════════════
FLOATING NAV — frosted glass dock
════════════════════════════════════════ */

.dock {
position: fixed;
bottom: calc(20px + env(safe-area-inset-bottom));
left: 50%; transform: translateX(-50%);
z-index: 50;
background: var(–glass);
backdrop-filter: blur(24px) saturate(1.4);
-webkit-backdrop-filter: blur(24px) saturate(1.4);
border: 1px solid var(–glass-border);
padding: 8px; border-radius: var(–r-pill);
display: flex; align-items: center; gap: 6px;
box-shadow: var(–neo-up), 0 12px 40px rgba(0,0,0,0.08);
}

.dock-btn {
width: 50px; height: 50px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
color: var(–text-3); position: relative;
transition: all 0.2s var(–ease);
}
.dock-btn.on { color: var(–sage); }
.dock-btn.on::after {
content: ‘’; position: absolute; bottom: 4px;
width: 5px; height: 5px; border-radius: 50%;
background: var(–sage);
}
.dock-btn:active { transform: scale(0.85); }

.dock-fab {
width: 54px; height: 54px; border-radius: 50%;
background: linear-gradient(145deg, var(–sage), var(–sage-deep));
color: var(–text-inv); display: flex; align-items: center; justify-content: center;
margin: 0 4px;
box-shadow: 3px 3px 12px rgba(107, 143, 118, 0.4), -2px -2px 8px rgba(139, 175, 147, 0.15);
transition: transform 0.2s var(–spring);
}
.dock-fab:active { transform: scale(0.88); }

/* ════════════════════════════════════════
BOTTOM SHEET — frosted glass panel
════════════════════════════════════════ */

.overlay {
position: fixed; inset: 0; z-index: 100;
background: rgba(0,0,0,0); pointer-events: none;
transition: background 0.35s;
}
.overlay.open { background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); pointer-events: auto; }

.sheet {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
background: var(–surf-2);
border: 1px solid var(–glass-border);
border-bottom: none;
border-radius: var(–r-lg) var(–r-lg) 0 0;
padding: 12px 24px calc(24px + env(safe-area-inset-bottom));
max-height: 92vh; display: flex; flex-direction: column;
box-shadow: 0 -8px 48px rgba(0,0,0,0.12);
transform: translateY(100%);
transition: transform 0.45s var(–ease);
}
.overlay.open .sheet { transform: translateY(0); }

.sheet-grip {
width: 40px; height: 4px; border-radius: 2px;
background: var(–text-3); opacity: 0.25;
margin: 0 auto 20px; flex-shrink: 0;
}
.sheet-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-shrink: 0; }
.sheet-hd h3 { font-family: var(–f-display); font-size: 1.3rem; font-weight: 700; }
.sheet-x {
width: 36px; height: 36px; border-radius: 12px;
background: var(–surf-1); box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–text-3); transition: all 0.15s;
}
.sheet-x:active { box-shadow: var(–neo-down); }
.sheet-body { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; padding-right: 4px; }

/* ─── FORM CONTROLS (tactile) ─── */
.fld { margin-bottom: 20px; }
.fld-l { display: block; font-size: 0.68rem; font-weight: 700; color: var(–text-3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.12em; }
.fld-in, .fld-ta, .fld-sel {
width: 100%; padding: 15px 18px;
background: var(–surf-1);
border: none; border-radius: var(–r-sm);
box-shadow: var(–neo-down);
font-size: 0.92rem; font-weight: 500; outline: none;
transition: box-shadow 0.2s;
color: var(–text-1);
}
.fld-in:focus, .fld-ta:focus, .fld-sel:focus {
box-shadow: var(–neo-down), 0 0 0 2px var(–sage-glow);
}
.fld-ta { min-height: 130px; resize: none; font-family: var(–f-jp); font-size: 1.05rem; line-height: 1.6; }
.fld-sel {
appearance: none;
background-image: url(“data:image/svg+xml,%3Csvg width=‘12’ height=‘8’ viewBox=‘0 0 12 8’ fill=‘none’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cpath d=‘M1 1.5L6 6.5L11 1.5’ stroke=’%237D776D’ stroke-width=‘2’ stroke-linecap=‘round’ stroke-linejoin=‘round’/%3E%3C/svg%3E”);
background-repeat: no-repeat; background-position: right 16px center;
}

/* ─── BUTTONS (neo-tactile) ─── */
.btn-row { display: flex; gap: 10px; margin-top: 8px; flex-shrink: 0; padding-top: 8px; }
.btn {
flex: 1; padding: 15px; border-radius: var(–r-pill);
font-size: 0.9rem; font-weight: 700;
display: flex; align-items: center; justify-content: center; gap: 8px;
transition: all 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn-fill {
background: linear-gradient(145deg, var(–sage), var(–sage-deep));
color: var(–text-inv);
box-shadow: 3px 3px 10px rgba(107, 143, 118, 0.35), -2px -2px 6px rgba(139, 175, 147, 0.15);
}
.btn-fill:active { box-shadow: inset 2px 2px 6px rgba(0,0,0,0.15); }
.btn-soft {
background: var(–surf-1);
box-shadow: var(–neo-up-sm);
color: var(–text-1);
}
.btn-soft:active { box-shadow: var(–neo-down); }
.btn-warn {
background: var(–surf-1);
box-shadow: var(–neo-up-sm);
color: var(–rose);
}
.btn-warn:active { box-shadow: var(–neo-down); }

/* ─── ICON PICKER ─── */
.ico-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.ico-opt {
aspect-ratio: 1; border-radius: var(–r-xs);
background: var(–surf-1); box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–text-3); transition: all 0.15s;
}
.ico-opt:active { box-shadow: var(–neo-down); }
.ico-opt.sel {
box-shadow: var(–neo-down);
color: var(–sage);
background: var(–sage-soft);
}

/* ─── SETTINGS LIST ─── */
.s-list { display: flex; flex-direction: column; gap: 10px; }
.s-item {
display: flex; align-items: center; gap: 14px;
padding: 14px 16px;
background: var(–surf-1);
border-radius: var(–r-sm);
box-shadow: var(–neo-up-sm);
transition: all 0.15s;
}
.s-item:active { box-shadow: var(–neo-down); transform: scale(0.98); }
.s-ico {
width: 40px; height: 40px; border-radius: 14px;
background: var(–surf-2); box-shadow: var(–neo-up-sm);
display: flex; align-items: center; justify-content: center;
color: var(–sage); flex-shrink: 0;
}
.s-txt { font-size: 0.92rem; font-weight: 600; }

/* ─── READER ─── */
.rd-img {
width: 100%; max-height: 340px; object-fit: cover;
border-radius: var(–r-md); margin-bottom: 20px;
box-shadow: var(–neo-up); background: var(–surf-1);
}
.rd-date {
font-size: 0.72rem; font-weight: 700; color: var(–sage);
text-transform: uppercase; letter-spacing: 0.08em;
margin-bottom: 14px; display: block;
}
.rd-body { font-family: var(–f-jp); font-size: 1.08rem; line-height: 1.75; white-space: pre-wrap; padding-bottom: 8px; }

/* ─── PHOTO UPLOAD ─── */
.photo-btn {
display: flex; align-items: center; gap: 10px;
padding: 14px 18px;
background: var(–surf-1); box-shadow: var(–neo-up-sm);
border-radius: var(–r-sm); color: var(–text-2);
font-size: 0.82rem; font-weight: 600; width: 100%;
transition: all 0.15s;
}
.photo-btn:active { box-shadow: var(–neo-down); }
.ph-prev { position: relative; display: inline-block; margin-top: 10px; }
.ph-prev img { height: 80px; border-radius: var(–r-sm); object-fit: cover; box-shadow: var(–neo-up-sm); }
.ph-rm {
position: absolute; top: -6px; right: -6px;
width: 24px; height: 24px; border-radius: 50%;
background: var(–text-1); color: var(–surf-0);
display: flex; align-items: center; justify-content: center;
box-shadow: var(–neo-flat);
}

/* ─── TOAST ─── */
.toast {
position: fixed; top: calc(16px + env(safe-area-inset-top));
left: 50%; transform: translateX(-50%) translateY(-20px);
background: var(–glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
border: 1px solid var(–glass-border);
color: var(–text-1); padding: 12px 28px;
border-radius: var(–r-pill); font-size: 0.82rem; font-weight: 700;

function compress(file,cb){
  if(!file)return;const r=new FileReader();
  r.onload=function(ev){const img=new Image();img.onload=function(){
    const c=document.createElement('canvas'),ctx=c.getContext('2d');
    let w=img.width,h=img.height;const M=800;
    if(w>h){if(w>M){h*=M/w;w=M;}}else{if(h>M){w*=M/h;h=M;}}
    c.width=w;c.height=h;ctx.drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.6));
  };img.src=ev.target.result;};r.readAsDataURL(file);
}

    const ents=(t.entries||[]).filter(e=>!SF||e.subsection===SF).sort((a,b)=>new Date(b.date)-new Date(a.date));
    let cards='';
    ents.forEach((e,i)=>{cards+=`<div class="e-card ani d${Math.min(i+1,6)}" onclick="openEntry('${t.id}','${e.id}')">

function showTopicSh(eid){
  const t=eid?tp(eid):null;

  openSh(`<div class="sheet-hd"><h3>${t?'Editar Cuaderno':'Nuevo Cuaderno'}</h3><button class="sheet-x" onclick="closeSh()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>

    <div class="fld"><label class="fld-l">Título</label><input id="fN" class="fld-in" placeholder="Ej: Reflexiones" value="${t?.name||''}"></div>
    <div class="fld"><label class="fld-l">Icono</label><div class="ico-grid">${icons}</div><input type="hidden" id="fI" value="${t?.icon||'folder'}"></div>
    <div class="fld"><label class="fld-l">Etiquetas (coma)</label><input id="fS" class="fld-in" placeholder="Ideas, Metas, Sueños…" value="${t?.subsections.join(', ')||''}"></div>

}
function selI(el,k){document.querySelectorAll('.ico-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('fI').value=k}
function saveTopic(eid){
  const name=document.getElementById('fN').value.trim(),ic=document.getElementById('fI').value,subs=document.getElementById('fS').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name)return;
  if(eid){const t=tp(eid);t.name=name;t.icon=ic;t.subsections=subs}
  else{S.topics.push({id:gid(),name,icon:ic,subsections:subs,entries:[]})}
  sv();closeSh();render();
}
function delTopic(i){

  <div class="btn-row"><button class="btn btn-soft" onclick="showTopicSh('${i}')">Cancelar</button><button class="btn btn-warn" onclick="doDelTopic('${i}')">Borrar</button></div>`);
}
function doDelTopic(i){S.topics=S.topics.filter(t=>t.id!==i);sv();closeSh();goHome();toast('Cuaderno eliminado')}

  <div class="btn-row"><button class="btn btn-fill" onclick="saveEntry('${tid}')">Guardar</button></div>`);
}

function hImg(inp){if(!inp.files[0])return;compress(inp.files[0],b=>{TI=b;document.getElementById(‘imgP’).innerHTML=`<div class="ph-prev"><img src="${b}" alt=""><button class="ph-rm" onclick="clImg()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`})}
function clImg(){TI=null;const p=document.getElementById(‘imgP’);if(p)p.innerHTML=’’;const i=document.getElementById(‘fEI’);if(i)i.value=’’}

function saveEntry(tid){
const text=document.getElementById(‘fET’).value.trim(),sub=document.getElementById(‘fES’).value;
if(!text&&!TI){toast(‘Escribe algo o sube una foto’);return}
tp(tid).entries.push({id:gid(),text,image:TI,subsection:sub,date:new Date().toISOString()});
sv();closeSh();render();toast(‘Guardado’);
}

/* ─── READ ENTRY ─── */
function openEntry(tid,eid){
const t=tp(tid),e=t.entries.find(x=>x.id===eid);
openSh(`<div class="sheet-hd"><h3>Memoria</h3><button class="sheet-x" onclick="closeSh()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>

  <div class="sheet-body">${e.image?`<img src="${e.image}" class="rd-img">`:''}<span class="rd-date">${fDL(e.date)}</span><div class="rd-body">${e.text}</div></div>
  <div class="btn-row"><button class="btn btn-soft" onclick="delEntry('${tid}','${eid}')">Borrar</button><button class="btn btn-fill" onclick="showEditEntry('${tid}','${eid}')">Editar</button></div>`);
}

function showEditEntry(tid,eid){
const t=tp(tid),e=t.entries.find(x=>x.id===eid);TI=e.image||null;
const opts=t.subsections.map(s=>`<option value="${s}" ${e.subsection===s?'selected':''}>${s}</option>`).join(’’);
let prev=’’;if(TI)prev=`<div class="ph-prev"><img src="${TI}" alt=""><button class="ph-rm" onclick="clImg()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
openSh(`<div class="sheet-hd"><h3>Editar nota</h3><button class="sheet-x" onclick="openEntry('${tid}','${eid}')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button></div>

  <div class="sheet-body">
    <div class="fld"><select id="fES" class="fld-sel"><option value="">Sin etiqueta</option>${opts}</select></div>
    <div class="fld"><textarea id="fET" class="fld-ta">${e.text}</textarea></div>
    <div class="fld"><button class="photo-btn" onclick="document.getElementById('fEI').click()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Cambiar foto</button>
    <input type="file" id="fEI" accept="image/*" style="display:none" onchange="hImg(this)"><div id="imgP">${prev}</div></div>
  </div>
  <div class="btn-row"><button class="btn btn-fill" onclick="updEntry('${tid}','${eid}')">Actualizar</button></div>`);
}

function updEntry(tid,eid){
const text=document.getElementById(‘fET’).value.trim(),sub=document.getElementById(‘fES’).value;
if(!text&&!TI){toast(‘Escribe algo o sube una foto’);return}
const e=tp(tid).entries.find(x=>x.id===eid);e.text=text;e.subsection=sub;e.image=TI;
sv();closeSh();render();toast(‘Actualizado’);
}
function delEntry(tid,eid){
openSh(`<div class="sheet-hd"><h3>¿Borrar memoria?</h3><button class="sheet-x" onclick="openEntry('${tid}','${eid}')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>

  <div class="sheet-body"><p style="font-size:0.92rem;color:var(--text-2);line-height:1.5;margin-bottom:8px">Esta nota se eliminará permanentemente.</p></div>
  <div class="btn-row"><button class="btn btn-soft" onclick="openEntry('${tid}','${eid}')">Cancelar</button><button class="btn btn-warn" onclick="doDelEntry('${tid}','${eid}')">Borrar</button></div>`);
}
function doDelEntry(tid,eid){const t=tp(tid);t.entries=t.entries.filter(e=>e.id!==eid);sv();closeSh();render();toast('Eliminada')}

/* ─── EXPORT/IMPORT ─── */
function showExport(){
const last=localStorage.getItem(FK)||‘nikki-backup’;
openSh(`<div class="sheet-hd"><h3>Exportar</h3><button class="sheet-x" onclick="showSettings()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button></div>

  <div class="sheet-body"><div class="fld"><label class="fld-l">Nombre del archivo</label><input id="fXN" class="fld-in" value="${last}"></div></div>
  <div class="btn-row"><button class="btn btn-fill" onclick="doExp()">Descargar</button></div>`);
}
async function doExp(){
  const name=document.getElementById('fXN').value.trim()||'nikki-backup';
  localStorage.setItem(FK,name);const json=JSON.stringify(S,null,2),fn=name+'.json';closeSh();
  if(window.showSaveFilePicker){try{const h=await window.showSaveFilePicker({suggestedName:fn,types:[{accept:{'application/json':['.json']}}]});const w=await h.createWritable();await w.write(json);await w.close();toast('Guardado');return}catch(e){return}}
  const b=new Blob([json],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();toast('Descargado');
}
function showImport(){
  openSh(`<div class="sheet-hd"><h3>Importar</h3><button class="sheet-x" onclick="showSettings()"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button></div>
  <div class="sheet-body"><div class="fld"><label class="fld-l">Archivo .json</label><input type="file" id="fIM" accept=".json" style="margin-top:8px;font-size:0.88rem"></div></div>
  <div class="btn-row"><button class="btn btn-fill" onclick="doImp()">Restaurar</button></div>`);
}
function doImp(){
  const file=document.getElementById('fIM').files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.topics){S=d;sv();goHome();toast('Restaurado');closeSh()}}catch(e){toast('Error de formato')}};r.readAsText(file);
}

/* ─── INIT ─── */
ld();initTh();render();
</script>

</body>
</html>
