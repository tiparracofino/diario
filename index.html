<style>

:root {
--surf-0:#E8E4DD; --surf-1:#EFECE6; --surf-2:#F6F4F0; --surf-3:#FDFCFA;
--neo-up:6px 6px 16px rgba(166,160,148,0.35), -6px -6px 16px rgba(255,255,255,0.8);
--neo-up-sm:3px 3px 8px rgba(166,160,148,0.3), -3px -3px 8px rgba(255,255,255,0.7);
--neo-down:inset 3px 3px 8px rgba(166,160,148,0.3), inset -3px -3px 8px rgba(255,255,255,0.7);
--neo-flat:0 2px 8px rgba(166,160,148,0.15);
--blue:#7A9BB3; --blue-deep:#5A82A0; --blue-soft:rgba(122,155,179,0.15); --blue-glow:rgba(122,155,179,0.25);
--lavender:#A69ABD; --lavender-soft:rgba(166,154,189,0.15);
--cream-accent:#C4A87D; --rose:#C48B8B;
--text-1:#3D3930; --text-2:#7D776D; --text-3:#AAA49A; --text-inv:#FDFCFA;
--glass:rgba(239,236,230,0.7); --glass-border:rgba(255,255,255,0.5); --glass-heavy:rgba(239,236,230,0.92);

}
[data-theme="dark"] {
--surf-0:#1A1D1E; --surf-1:#222628; --surf-2:#2A2F32; --surf-3:#343A3D;
--neo-up:6px 6px 18px rgba(0,0,0,0.5), -6px -6px 18px rgba(60,66,70,0.25);

--neo-down:inset 3px 3px 10px rgba(0,0,0,0.45), inset -3px -3px 10px rgba(60,66,70,0.15);
--neo-flat:0 2px 8px rgba(0,0,0,0.3);
--blue:#7DA6B8; --blue-deep:#5E8CA0; --blue-soft:rgba(125,166,184,0.12); --blue-glow:rgba(125,166,184,0.2);
--lavender:#B0A3CF; --lavender-soft:rgba(176,163,207,0.12);
--cream-accent:#D4B88A; --rose:#D49A9A;
--text-1:#E2DED6; --text-2:#8A857D; --text-3:#5C5850; --text-inv:#1A1D1E;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;display:flex;flex-direction:column;background:var(--surf-0);color:var(--text-1);font-family:var(--f-body);overflow:hidden;-webkit-font-smoothing:antialiased;transition:background-color 0.5s var(--ease),color 0.5s var(--ease);padding-top:env(safe-area-inset-top)}
button{border:none;background:none;font-family:inherit;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;color:inherit;background:var(--surf-1)}
::-webkit-scrollbar{width:0;height:0}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(100px + env(safe-area-inset-bottom))}

.hero{padding:44px 24px 0}
.hero-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.hero-text{display:flex;flex-direction:column;gap:2px}
.hero-sub{font-size:0.78rem;font-weight:600;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase}
.hero-h{font-family:var(--f-display);font-size:1.9rem;font-weight:700;color:var(--text-1);line-height:1.15}
.neo-btn{width:48px;height:48px;border-radius:16px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all 0.15s ease}
.neo-btn:active{box-shadow:var(--neo-down);transform:scale(0.96)}
.hero-card{border-radius:var(--r-lg);padding:2px;background:linear-gradient(135deg,rgba(255,255,255,0.5),rgba(255,255,255,0.1));margin-bottom:36px;position:relative}
[data-theme="dark"] .hero-card{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02))}
.hero-card-inner{border-radius:30px;overflow:hidden;position:relative;aspect-ratio:2;background:linear-gradient(160deg,#C0CFD5 0%,#A0B3BE 30%,#809CAF 60%,#6B8A9A 100%)}
[data-theme="dark"] .hero-card-inner{background:linear-gradient(160deg,#1E2A33 0%,#1A252E 30%,#161F28 60%,#121A22 100%)}
.hero-card-inner svg{width:100%;height:100%;position:absolute;inset:0}
.hero-pill{position:absolute;top:14px;left:14px;background:var(--glass-heavy);border:1px solid var(--glass-border);padding:7px 16px;border-radius:var(--r-pill);font-size:0.72rem;font-weight:600;color:var(--text-1);box-shadow:var(--neo-flat)}
.hero-kanji{position:absolute;bottom:14px;right:18px;font-family:var(--f-jp);font-size:2.6rem;font-weight:600;color:rgba(255,255,255,0.2);line-height:1;pointer-events:none}
[data-theme="dark"] .hero-kanji{color:rgba(255,255,255,0.07)}
.sec-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 24px;margin-bottom:18px}
.sec-head h2{font-family:var(--f-display);font-size:1.35rem;font-weight:700}
.sec-head .badge{font-size:0.7rem;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);background:var(--blue-soft);color:var(--blue)}
.bento{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:0 24px 32px}
.b-card{background:var(--surf-1);border-radius:var(--r-lg);padding:20px 18px;display:flex;flex-direction:column;justify-content:space-between;aspect-ratio:0.88;box-shadow:var(--neo-up);cursor:pointer;position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s var(--ease)}
.b-card:active{box-shadow:var(--neo-down);transform:scale(0.97)}
.b-glow{position:absolute;top:-10px;right:-10px;width:90px;height:90px;border-radius:50%;filter:blur(35px);opacity:0.4;pointer-events:none}
.b-glow.g-blue{background:var(--blue)}.b-glow.g-lav{background:var(--lavender)}.b-glow.g-cream{background:var(--cream-accent)}.b-glow.g-rose{background:var(--rose)}
.b-ico{width:48px;height:48px;border-radius:16px;background:var(--surf-2);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--blue);position:relative;z-index:1;margin-bottom:auto}
.b-info{position:relative;z-index:1}
.b-name{font-family:var(--f-display);font-size:1.05rem;font-weight:600;line-height:1.2;margin-bottom:3px}
.b-meta{font-size:0.7rem;font-weight:600;color:var(--text-3)}
.empty{display:flex;flex-direction:column;align-items:center;padding:52px 28px;text-align:center}
.empty-ico{width:72px;height:72px;border-radius:24px;background:var(--surf-1);box-shadow:var(--neo-up);display:flex;align-items:center;justify-content:center;color:var(--blue);margin-bottom:20px}
.empty h3{font-family:var(--f-display);font-size:1.2rem;font-weight:700;margin-bottom:8px}
.empty p{font-size:0.88rem;color:var(--text-2);line-height:1.5;max-width:240px}
.v-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 24px 12px;position:sticky;top:0;z-index:20;background:var(--glass-heavy);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background-color 0.5s}
.v-back{width:44px;height:44px;border-radius:14px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all 0.15s}
.v-back:active{box-shadow:var(--neo-down);transform:scale(0.92)}
.v-title{font-family:var(--f-display);font-size:1.2rem;font-weight:700}
.v-action{width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--text-3)}
.tabs{display:flex;gap:10px;padding:4px 24px 20px;overflow-x:auto;scrollbar-width:none}
.tab{padding:10px 20px;border-radius:var(--r-pill);font-size:0.8rem;font-weight:600;white-space:nowrap;background:var(--surf-1);color:var(--text-2);box-shadow:var(--neo-up-sm);transition:all 0.2s}
.tab.on{background:var(--blue);color:var(--text-inv);box-shadow:3px 3px 10px rgba(90,130,160,0.35),-2px -2px 8px rgba(122,155,179,0.2)}
.tab:active{box-shadow:var(--neo-down)}
.entries{display:flex;flex-direction:column;gap:16px;padding:0 24px 28px}
.e-card{background:var(--surf-1);border-radius:var(--r-lg);box-shadow:var(--neo-up);overflow:hidden;cursor:pointer;transition:all 0.2s var(--ease)}
.e-card:active{box-shadow:var(--neo-down);transform:scale(0.98)}
.e-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--surf-2)}
.e-body{padding:18px 20px}
.e-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.e-date{font-size:0.76rem;font-weight:600;color:var(--text-2)}
.e-tag{font-size:0.65rem;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);background:var(--lavender-soft);color:var(--lavender);text-transform:uppercase;letter-spacing:0.06em}
.e-text{font-size:0.92rem;line-height:1.6;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dock{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:50;background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--glass-border);padding:8px;border-radius:var(--r-pill);display:flex;align-items:center;gap:6px;box-shadow:var(--neo-up),0 12px 40px rgba(0,0,0,0.08)}
.dock-btn{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-3);position:relative;transition:all 0.2s var(--ease)}
.dock-btn.on{color:var(--blue)}
.dock-btn.on::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--blue)}
.dock-btn:active{transform:scale(0.85)}
.dock-fab{width:54px;height:54px;border-radius:50%;background:linear-gradient(145deg,var(--blue),var(--blue-deep));color:var(--text-inv);display:flex;align-items:center;justify-content:center;margin:0 4px;box-shadow:3px 3px 12px rgba(90,130,160,0.4),-2px -2px 8px rgba(122,155,179,0.15);transition:transform 0.2s var(--spring)}
.dock-fab:active{transform:scale(0.88)}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.35s}
.overlay.open{background:rgba(0,0,0,0.35);pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--surf-2);border:1px solid var(--glass-border);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:12px 24px calc(24px + env(safe-area-inset-bottom));max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -8px 48px rgba(0,0,0,0.12);transform:translateY(100%);transition:transform 0.45s var(--ease);pointer-events:none}
.sheet.open{transform:translateY(0);pointer-events:auto}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--text-3);opacity:0.25;margin:0 auto 20px;flex-shrink:0}
.sheet-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-shrink:0}
.sheet-hd h3{font-family:var(--f-display);font-size:1.3rem;font-weight:700}
.sheet-x{width:36px;height:36px;border-radius:12px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all 0.15s}
.sheet-x:active{box-shadow:var(--neo-down)}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-right:4px}
.fld{margin-bottom:20px}
.fld-l{display:block;font-size:0.68rem;font-weight:700;color:var(--text-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.12em}
.fld-in,.fld-ta,.fld-sel{width:100%;padding:15px 18px;background:var(--surf-1);color:var(--text-1);border:none;border-radius:var(--r-sm);box-shadow:var(--neo-down);font-size:0.92rem;font-weight:500;outline:none;transition:box-shadow 0.2s;-webkit-appearance:none}

.fld-ta{min-height:130px;resize:none;font-family:var(--f-jp);font-size:1.05rem;line-height:1.6}
.fld-sel{appearance:none;-webkit-appearance:none;background-color:var(--surf-1);background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%237D776D' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}
.btn-row{display:flex;gap:10px;margin-top:8px;flex-shrink:0;padding-top:8px}
.btn{flex:1;padding:15px;border-radius:var(--r-pill);font-size:0.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
.btn:active{transform:scale(0.96)}
.btn-fill{background:linear-gradient(145deg,var(--blue),var(--blue-deep));color:var(--text-inv);box-shadow:3px 3px 10px rgba(90,130,160,0.35),-2px -2px 6px rgba(122,155,179,0.15)}
.btn-fill:active{box-shadow:inset 2px 2px 6px rgba(0,0,0,0.15)}
.btn-soft{background:var(--surf-1);box-shadow:var(--neo-up-sm);color:var(--text-1)}
.btn-soft:active{box-shadow:var(--neo-down)}
.btn-warn{background:var(--surf-1);box-shadow:var(--neo-up-sm);color:var(--rose)}
.btn-warn:active{box-shadow:var(--neo-down)}
.ico-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ico-opt{aspect-ratio:1;border-radius:var(--r-xs);background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all 0.15s}
.ico-opt:active{box-shadow:var(--neo-down)}
.ico-opt.sel{box-shadow:var(--neo-down);color:var(--blue);background:var(--blue-soft)}
.s-list{display:flex;flex-direction:column;gap:10px}
.s-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surf-1);border-radius:var(--r-sm);box-shadow:var(--neo-up-sm);transition:all 0.15s}
.s-item:active{box-shadow:var(--neo-down);transform:scale(0.98)}
.s-ico{width:40px;height:40px;border-radius:14px;background:var(--surf-2);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0}
.s-txt{font-size:0.92rem;font-weight:600}
.rd-img{width:100%;max-height:340px;object-fit:cover;border-radius:var(--r-md);margin-bottom:20px;box-shadow:var(--neo-up);background:var(--surf-1)}
.rd-date{font-size:0.72rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;display:block}
.rd-body{font-family:var(--f-jp);font-size:1.08rem;line-height:1.75;white-space:pre-wrap;padding-bottom:8px}
.photo-btn{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--surf-1);box-shadow:var(--neo-up-sm);border-radius:var(--r-sm);color:var(--text-2);font-size:0.82rem;font-weight:600;width:100%;transition:all 0.15s}
.photo-btn:active{box-shadow:var(--neo-down)}
.ph-prev{position:relative;display:inline-block;margin-top:10px}
.ph-prev img{height:80px;border-radius:var(--r-sm);object-fit:cover;box-shadow:var(--neo-up-sm)}
.ph-rm{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--text-1);color:var(--surf-0);display:flex;align-items:center;justify-content:center;box-shadow:var(--neo-flat)}
.toast{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:var(--glass-heavy);border:1px solid var(--glass-border);color:var(--text-1);padding:12px 28px;border-radius:var(--r-pill);font-size:0.82rem;font-weight:700;z-index:200;opacity:0;pointer-events:none;transition:all 0.35s var(--ease);box-shadow:var(--neo-up)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:rise 0.5s var(--ease) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}
svg{stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>

function compress(file,cb){
  if(!file) return;
  var r = new FileReader();
  r.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas'), ctx = c.getContext('2d');
      var w = img.width, h = img.height, M = 800;
      if(w>h){ if(w>M){h*=M/w;w=M;} } else { if(h>M){w*=M/h;h=M;} }
      c.width=w; c.height=h; ctx.drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.6));
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

  TI = e.image||null;
  var opts='';
  for(var i=0;i<t.subsections.length;i++){
    var s=t.subsections[i];
    opts += '<option value="'+esc(s)+'" '+(e.subsection===s?'selected':'')+'>'+esc(s)+'</option>';
  }
  var prev = TI ? '<div class="ph-prev"><img src="'+TI+'" alt=""><button class="ph-rm" onclick="clImg()">'+X_SVG+'</button></div>' : '';
  openSh('<div class="sheet-hd"><h3>Editar nota</h3><button class="sheet-x" onclick="openEntry(\''+tid+'\',\''+eid+'\')">'+BACK_SVG+'</button></div>'
    +'<div class="sheet-body">'
    +'<div class="fld"><select id="fES" class="fld-sel"><option value="">Sin etiqueta</option>'+opts+'</select></div>'
    +'<div class="fld"><textarea id="fET" class="fld-ta">'+esc(e.text)+'</textarea></div>'
    +'<div class="fld"><button class="photo-btn" onclick="document.getElementById(\'fEI\').click()">'+IMG_SVG+' Cambiar foto</button>'
    +'<input type="file" id="fEI" accept="image/*" style="display:none" onchange="hImg(this)"><div id="imgP">'+prev+'</div></div>'
    +'</div>'
    +'<div class="btn-row"><button class="btn btn-fill" onclick="updEntry(\''+tid+'\',\''+eid+'\')">Actualizar</button></div>');
};

window.updEntry = function(tid,eid){
  var text=document.getElementById('fET').value.trim(), sub=document.getElementById('fES').value;
  if(!text&&!TI){toast('Escribe algo o sube una foto');return;}
  var t=tp(tid);if(!t)return;
  var e=null;for(var i=0;i<t.entries.length;i++){if(t.entries[i].id===eid){e=t.entries[i];break;}}if(!e)return;
  e.text=text; e.subsection=sub; e.image=TI;
  sv(); window.closeSh(); render(); toast('Actualizado');
};

window.delEntry = function(tid,eid){
  openSh('<div class="sheet-hd"><h3>¿Borrar memoria?</h3><button class="sheet-x" onclick="openEntry(\''+tid+'\',\''+eid+'\')">'+X_SVG+'</button></div>'
    +'<div class="sheet-body"><p style="font-size:0.92rem;color:var(--text-2);line-height:1.5">Esta nota se eliminará permanentemente.</p></div>'
    +'<div class="btn-row"><button class="btn btn-soft" onclick="openEntry(\''+tid+'\',\''+eid+'\')">Cancelar</button><button class="btn btn-warn" onclick="doDelEntry(\''+tid+'\',\''+eid+'\')">Borrar</button></div>');
};

window.doDelEntry = function(tid,eid){
  var t=tp(tid);if(!t)return;
  var arr=[];for(var i=0;i<t.entries.length;i++){if(t.entries[i].id!==eid)arr.push(t.entries[i]);}t.entries=arr;
  sv(); window.closeSh(); render(); toast('Eliminada');
};

window.showExport = function(){
  var last = localStorage.getItem(FK)||'nikki-backup';
  openSh('<div class="sheet-hd"><h3>Exportar</h3><button class="sheet-x" onclick="showSettings()">'+BACK_SVG+'</button></div>'
    +'<div class="sheet-body"><div class="fld"><label class="fld-l">Nombre del archivo</label><input id="fXN" class="fld-in" value="'+esc(last)+'"></div></div>'
    +'<div class="btn-row"><button class="btn btn-fill" onclick="doExp()">Descargar</button></div>');
};

window.doExp = function(){
  var name=document.getElementById('fXN').value.trim()||'nikki-backup';
  localStorage.setItem(FK,name);
  var json=JSON.stringify(S,null,2), fn=name+'.json';
  window.closeSh();
  var b=new Blob([json],{type:'application/json'}), a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download=fn; a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
  toast('Descargado');
};

window.showImport = function(){
  openSh('<div class="sheet-hd"><h3>Importar</h3><button class="sheet-x" onclick="showSettings()">'+BACK_SVG+'</button></div>'
    +'<div class="sheet-body"><div class="fld"><label class="fld-l">Archivo .json</label><input type="file" id="fIM" accept=".json" style="margin-top:8px;font-size:0.88rem"></div></div>'
    +'<div class="btn-row"><button class="btn btn-fill" onclick="doImp()">Restaurar</button></div>');
};

window.doImp = function(){
  var file=document.getElementById('fIM').files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d&&d.topics){ S=d; sv(); window.closeSh(); V='home';TID=null;SF=null; render(); toast('Restaurado'); }
      else { toast('Formato incorrecto'); }
    }catch(e){ toast('Error de formato'); }
  };
  r.readAsText(file);
};

// Boot
ld(); initTh(); render();

})();
</script>

</body>
</html>
