<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nikki">
<meta name="theme-color" content="#E8E4DD">
<title>Nikki · 日記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap');

:root {
--surf-0:#E8E4DD; --surf-1:#EFECE6; --surf-2:#F6F4F0; --surf-3:#FDFCFA;
--neo-up:6px 6px 16px rgba(166,160,148,0.35), -6px -6px 16px rgba(255,255,255,0.8);
--neo-up-sm:3px 3px 8px rgba(166,160,148,0.3), -3px -3px 8px rgba(255,255,255,0.7);
--neo-down:inset 3px 3px 8px rgba(166,160,148,0.3), inset -3px -3px 8px rgba(255,255,255,0.7);
--neo-flat:0 2px 8px rgba(166,160,148,0.15);
--blue:#7A9BB3; --blue-deep:#5A82A0; --blue-soft:rgba(122,155,179,0.15); --blue-glow:rgba(122,155,179,0.25);
--lavender:#A69ABD; --lavender-soft:rgba(166,154,189,0.15);
--cream-accent:#C4A87D; --rose:#C48B8B;
--text-1:#3D3930; --text-2:#7D776D; --text-3:#AAA49A; --text-inv:#FDFCFA;
--glass:rgba(239,236,230,0.7); --glass-border:rgba(255,255,255,0.5); --glass-heavy:rgba(239,236,230,0.92);
--r-xs:12px; --r-sm:16px; --r-md:24px; --r-lg:32px; --r-pill:100px;
--f-display:'Fraunces','Noto Serif JP',serif; --f-body:'Outfit',sans-serif; --f-jp:'Noto Serif JP',serif;
--ease:cubic-bezier(0.16,1,0.3,1); --spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"] {
--surf-0:#1A1D1E; --surf-1:#222628; --surf-2:#2A2F32; --surf-3:#343A3D;
--neo-up:6px 6px 18px rgba(0,0,0,0.5), -6px -6px 18px rgba(60,66,70,0.25);
--neo-up-sm:3px 3px 10px rgba(0,0,0,0.45), -3px -3px 10px rgba(60,66,70,0.2);
--neo-down:inset 3px 3px 10px rgba(0,0,0,0.45), inset -3px -3px 10px rgba(60,66,70,0.15);
--neo-flat:0 2px 8px rgba(0,0,0,0.3);
--blue:#7DA6B8; --blue-deep:#5E8CA0; --blue-soft:rgba(125,166,184,0.12); --blue-glow:rgba(125,166,184,0.2);
--lavender:#B0A3CF; --lavender-soft:rgba(176,163,207,0.12);
--cream-accent:#D4B88A; --rose:#D49A9A;
--text-1:#E2DED6; --text-2:#8A857D; --text-3:#5C5850; --text-inv:#1A1D1E;
--glass:rgba(30,34,36,0.75); --glass-border:rgba(255,255,255,0.06); --glass-heavy:rgba(26,29,30,0.94);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;display:flex;flex-direction:column;background:var(--surf-0);color:var(--text-1);font-family:var(--f-body);overflow:hidden;-webkit-font-smoothing:antialiased;transition:background-color 0.5s var(--ease),color 0.5s var(--ease);padding-top:env(safe-area-inset-top)}
button{border:none;background:none;font-family:inherit;cursor:pointer;color:inherit}
input,textarea,select{font-family:inherit;color:inherit;background:var(--surf-1)}
::-webkit-scrollbar{width:0;height:0}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(100px + env(safe-area-inset-bottom))}

.hero{padding:44px 24px 0}
.hero-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.hero-text{display:flex;flex-direction:column;gap:2px}
.hero-sub{font-size:0.78rem;font-weight:600;color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase}
.hero-h{font-family:var(--f-display);font-size:1.9rem;font-weight:700;color:var(--text-1);line-height:1.15}
.neo-btn{width:48px;height:48px;border-radius:16px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all 0.15s ease}
.neo-btn:active{box-shadow:var(--neo-down);transform:scale(0.96)}

.hero-card{border-radius:var(--r-lg);padding:2px;background:linear-gradient(135deg,rgba(255,255,255,0.5),rgba(255,255,255,0.1));margin-bottom:36px;position:relative}
[data-theme="dark"] .hero-card{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02))}
.hero-card-inner{border-radius:30px;overflow:hidden;position:relative;aspect-ratio:2;background:linear-gradient(160deg,#C0CFD5 0%,#A0B3BE 30%,#809CAF 60%,#6B8A9A 100%)}
[data-theme="dark"] .hero-card-inner{background:linear-gradient(160deg,#1E2A33 0%,#1A252E 30%,#161F28 60%,#121A22 100%)}
.hero-card-inner svg{width:100%;height:100%;position:absolute;inset:0}
.hero-pill{position:absolute;top:14px;left:14px;background:var(--glass-heavy);border:1px solid var(--glass-border);padding:7px 16px;border-radius:var(--r-pill);font-size:0.72rem;font-weight:600;color:var(--text-1);box-shadow:var(--neo-flat)}
.hero-kanji{position:absolute;bottom:14px;right:18px;font-family:var(--f-jp);font-size:2.6rem;font-weight:600;color:rgba(255,255,255,0.2);line-height:1;pointer-events:none}
[data-theme="dark"] .hero-kanji{color:rgba(255,255,255,0.07)}

.sec-head{display:flex;justify-content:space-between;align-items:baseline;padding:0 24px;margin-bottom:18px}
.sec-head h2{font-family:var(--f-display);font-size:1.35rem;font-weight:700}
.sec-head .badge{font-size:0.7rem;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);background:var(--blue-soft);color:var(--blue)}

.bento{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:0 24px 32px}
.b-card{background:var(--surf-1);border-radius:var(--r-lg);padding:20px 18px;display:flex;flex-direction:column;justify-content:space-between;aspect-ratio:0.88;box-shadow:var(--neo-up);cursor:pointer;position:relative;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s var(--ease)}
.b-card:active{box-shadow:var(--neo-down);transform:scale(0.97)}

.search-box{padding:0 24px 16px;position:relative}
.search-in{width:100%;height:46px;padding:0 44px 0 18px;background:var(--surf-1);border-radius:var(--r-pill);box-shadow:var(--neo-down);border:none;font-size:0.88rem;color:var(--text-1);outline:none;transition:all 0.2s}
.search-in:focus{box-shadow:var(--neo-down), 0 0 0 2px var(--blue-soft)}
.search-ico{position:absolute;right:36px;top:13px;color:var(--text-3);pointer-events:none}

.hl{background:var(--blue-glow);color:var(--blue);border-radius:2px;padding:0 1px;font-weight:600}

.v-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 24px 12px;position:sticky;top:0;z-index:20;background:var(--glass-heavy);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background-color 0.5s}
.v-back{width:44px;height:44px;border-radius:14px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all 0.15s}
.v-back:active{box-shadow:var(--neo-down);transform:scale(0.92)}
.v-title{font-family:var(--f-display);font-size:1.2rem;font-weight:700}
.v-action{width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:var(--text-3)}

.tabs{display:flex;gap:10px;padding:4px 24px 20px;overflow-x:auto;scrollbar-width:none}
.tab{padding:10px 20px;border-radius:var(--r-pill);font-size:0.8rem;font-weight:600;white-space:nowrap;background:var(--surf-1);color:var(--text-2);box-shadow:var(--neo-up-sm);transition:all 0.2s}
.tab.on{background:var(--blue);color:var(--text-inv);box-shadow:3px 3px 10px rgba(90,130,160,0.35),-2px -2px 8px rgba(122,155,179,0.2)}

.entries{display:flex;flex-direction:column;gap:16px;padding:0 24px 28px}
.e-card{background:var(--surf-1);border-radius:var(--r-lg);box-shadow:var(--neo-up);overflow:hidden;cursor:pointer;transition:all 0.2s var(--ease)}
.e-card:active{box-shadow:var(--neo-down);transform:scale(0.98)}
.e-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--surf-2)}
.e-body{padding:18px 20px}
.e-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.e-date{font-size:0.76rem;font-weight:600;color:var(--text-2)}
.e-tag{font-size:0.65rem;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);background:var(--lavender-soft);color:var(--lavender);text-transform:uppercase;letter-spacing:0.06em}
.e-text{font-size:0.92rem;line-height:1.6;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.dock{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:50;background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--glass-border);padding:8px;border-radius:var(--r-pill);display:flex;align-items:center;gap:6px;box-shadow:var(--neo-up),0 12px 40px rgba(0,0,0,0.08)}
.dock-btn{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-3);position:relative;transition:all 0.2s var(--ease)}
.dock-btn.on{color:var(--blue)}
.dock-btn.on::after{content:'';position:absolute;bottom:4px;width:5px;height:5px;border-radius:50%;background:var(--blue)}
.dock-fab{width:54px;height:54px;border-radius:50%;background:linear-gradient(145deg,var(--blue),var(--blue-deep));color:var(--text-inv);display:flex;align-items:center;justify-content:center;margin:0 4px;box-shadow:3px 3px 12px rgba(90,130,160,0.4),-2px -2px 8px rgba(122,155,179,0.15)}

.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--surf-2);border:1px solid var(--glass-border);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;padding:12px 24px calc(24px + env(safe-area-inset-bottom));max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -8px 48px rgba(0,0,0,0.12);transform:translate3d(0, 100%, 0);transition:transform 0.45s var(--ease);pointer-events:none}
.sheet.open{transform:translate3d(0, 0, 0);pointer-events:auto}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--text-3);opacity:0.25;margin:0 auto 20px;flex-shrink:0}
.sheet-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-shrink:0}
.sheet-hd h3{font-family:var(--f-display);font-size:1.3rem;font-weight:700}
.sheet-x{width:36px;height:36px;border-radius:12px;background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all 0.15s}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding-right:4px;}

.fld{margin-bottom:20px}
.fld-l{display:block;font-size:0.68rem;font-weight:700;color:var(--text-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.12em}
.fld-in,.fld-ta,.fld-sel{width:100%;padding:15px 18px;background:var(--surf-1);color:var(--text-1);border:none;border-radius:var(--r-sm);box-shadow:var(--neo-down);font-size:0.92rem;font-weight:500;outline:none;font-family:var(--f-body);}
input[type="date"]{text-transform:uppercase;letter-spacing:0.05em;font-size:0.88rem;}
.fld-ta{min-height:130px;resize:none}
.fld-sel{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%237D776D' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center}

.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{flex:1;padding:15px;border-radius:var(--r-pill);font-size:0.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
.btn-fill{background:linear-gradient(145deg,var(--blue),var(--blue-deep));color:var(--text-inv)}
.btn-soft{background:var(--surf-1);box-shadow:var(--neo-up-sm);color:var(--text-1)}
.btn-warn{background:var(--surf-1);box-shadow:var(--neo-up-sm);color:var(--rose)}
.btn:active{transform:scale(0.95)}

.ico-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ico-opt{aspect-ratio:1;border-radius:var(--r-xs);background:var(--surf-1);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3)}
.ico-opt.sel{box-shadow:var(--neo-down);color:var(--blue)}

.s-list{display:flex;flex-direction:column;gap:10px}
.s-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surf-1);border-radius:var(--r-sm);box-shadow:var(--neo-up-sm)}
.s-ico{width:40px;height:40px;border-radius:14px;background:var(--surf-2);display:flex;align-items:center;justify-content:center;color:var(--blue)}
.s-txt{font-size:0.92rem;font-weight:600}

.rd-img{width:100%;max-height:340px;object-fit:cover;border-radius:var(--r-md);margin-bottom:20px}
.rd-date{font-size:0.72rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;display:block}
.rd-body{font-family:var(--f-jp);font-size:1.08rem;line-height:1.75;white-space:pre-wrap}

.photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 10px;background:var(--surf-1);box-shadow:var(--neo-up-sm);border-radius:var(--r-sm);color:var(--text-2);font-size:0.82rem;font-weight:600;flex:1;transition:all 0.15s}
.photo-btn:active{box-shadow:var(--neo-down)}
.ph-prev{position:relative;display:inline-block;margin-top:10px;width:100%}
.ph-prev img{height:80px;border-radius:var(--r-sm);object-fit:cover}
.ph-rm{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--text-1);color:var(--surf-0);display:flex;align-items:center;justify-content:center;z-index:2}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.35s}
.overlay.open{background:rgba(0,0,0,0.35);pointer-events:auto}

.toast{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:var(--glass-heavy);border:1px solid var(--glass-border);color:var(--text-1);padding:12px 28px;border-radius:var(--r-pill);font-size:0.82rem;font-weight:700;z-index:200;opacity:0;pointer-events:none;transition:all 0.35s var(--ease);box-shadow:var(--neo-up)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CALENDARIO CSS */
.cal{background:var(--surf-1);border-radius:var(--r-lg);padding:20px;box-shadow:var(--neo-up);margin-bottom:20px}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-title{font-family:var(--f-display);font-size:1.1rem;font-weight:700;text-transform:capitalize}
.cal-btn{width:36px;height:36px;border-radius:10px;background:var(--surf-2);box-shadow:var(--neo-up-sm);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all 0.15s}
.cal-btn:active{box-shadow:var(--neo-down)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center}
.cal-dw{font-size:0.7rem;font-weight:700;color:var(--text-3);margin-bottom:8px}
.cal-d{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.9rem;font-weight:600;border-radius:var(--r-sm);position:relative;cursor:pointer;transition:all 0.2s}
.cal-d.empty{pointer-events:none}
.cal-d:active{background:var(--surf-2);box-shadow:var(--neo-down)}
.cal-d.sel{background:var(--blue);color:var(--text-inv);box-shadow:var(--neo-up-sm)}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);position:absolute;bottom:4px}
.cal-d.sel .cal-dot{background:var(--surf-0)}

/* PIN LOCK CSS */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;position:fixed;inset:0;background:var(--surf-0);z-index:900}
.lock-ico{width:80px;height:80px;border-radius:24px;background:var(--surf-1);box-shadow:var(--neo-up);display:flex;align-items:center;justify-content:center;color:var(--blue);margin-bottom:24px}
.lock-title{font-family:var(--f-display);font-size:1.5rem;font-weight:700;margin-bottom:32px;color:var(--text-1)}
.pin-dots{display:flex;gap:16px;margin-bottom:48px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--surf-2);box-shadow:inset 2px 2px 5px rgba(0,0,0,0.1);transition:all 0.2s}
[data-theme="dark"] .pin-dot{box-shadow:inset 2px 2px 5px rgba(0,0,0,0.5)}
.pin-dot.on{background:var(--blue);box-shadow:var(--neo-up-sm)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:300px;width:100%}
.pin-btn{aspect-ratio:1;border-radius:50%;background:var(--surf-1);box-shadow:var(--neo-up-sm);font-size:1.6rem;font-weight:600;color:var(--text-1);display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.pin-btn:active{box-shadow:var(--neo-down);transform:scale(0.92)}
.pin-btn.empty{box-shadow:none;background:transparent;pointer-events:none}

@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:rise 0.5s var(--ease) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}

svg{stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="scroll" id="main"></div>
<nav class="dock">
  <button class="dock-btn" id="nH" onclick="goHome()"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
  <button class="dock-btn" id="nC" onclick="goCalendar()"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
  <button class="dock-fab" onclick="onFab()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  <button class="dock-btn" id="nT" onclick="goTimeline()"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
</nav>
<div class="overlay" id="ov" onclick="closeSh()"></div>
<div class="sheet" id="sh"></div>
<div class="toast" id="toast"></div>

<script>
(async function(){
"use strict";

var SK='nikki_nature_data', TK='nikki_nature_theme';
var IC = {
  folder:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',

// IndexedDB Wrapper
var db;
function initDB() {
  return new Promise((res, rej) => {
    var req = indexedDB.open('NikkiDB', 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore('data'); };
    req.onsuccess = function(e) { db = e.target.result; res(); };
    req.onerror = rej;
  });
}
function idbGet(k) {
  return new Promise(res => {
    try {
      var tx = db.transaction('data', 'readonly'), req = tx.objectStore('data').get(k);
      req.onsuccess = () => res(req.result); req.onerror = () => res(null);
    } catch (e) { res(null); }
  });
}
function idbPut(k, v) {
  return new Promise(res => {
    try {
      var tx = db.transaction('data', 'readwrite'); tx.objectStore('data').put(v, k);
      tx.oncomplete = res; tx.onerror = res;
    } catch (e) { res(); }
  });
}

function isoYMD(dstr) { 
  var d = dstr ? new Date(dstr) : new Date(); 
  var y = d.getFullYear(), m = d.getMonth() + 1, dd = d.getDate();
  return y + '-' + (m < 10 ? '0' : '') + m + '-' + (dd < 10 ? '0' : '') + dd;
}
function fD(d){ return new Date(d).toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}); }
function fDL(d){ return new Date(d).toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function esc(s){ return (!s) ? '' : s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function highlight(text, query) {
  if (!query || !text) return esc(text);
  const escapedQuery = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
  const regex = new RegExp(`(${escapedQuery})`, 'gi');
  return esc(text).replace(regex, '<span class="hl">$1</span>');
}

function compress(file,cb){
  var r = new FileReader();
  r.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var c = document.createElement('canvas'), ctx = c.getContext('2d');
      var w = img.width, h = img.height, M = 800;
      if(w>h){ if(w>M){h*=M/w;w=M;} } else { if(h>M){w*=M/h;h=M;} }
      c.width=w; c.height=h; ctx.drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.6));
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

function renderCalendar() {
  var todayYMD = isoYMD();
  if(!SEL_DATE) SEL_DATE = todayYMD;
  var firstDay = new Date(CY, CM, 1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay - 1;
  var daysInMonth = new Date(CY, CM + 1, 0).getDate();
  var mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  
  var daysHtml = '';
  ['L','M','X','J','V','S','D'].forEach(w => daysHtml += `<div class="cal-dw">${w}</div>`);
  for(var i=0; i<firstDay; i++) daysHtml += `<div class="cal-d empty"></div>`;
  
  for(var d=1; d<=daysInMonth; d++){
    var dateStr = `${CY}-${(CM+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
    var hasEnt = S.topics.some(t => t.entries.some(e => isoYMD(e.date) === dateStr && isoYMD(e.date) <= todayYMD));
    var isSel = (dateStr === SEL_DATE);
    daysHtml += `<div class="cal-d ${isSel?'sel':''}" onclick="selDate('${dateStr}')"><span class="cal-num">${d}</span>${hasEnt?'<div class="cal-dot"></div>':''}</div>`;
  }

  var list = [];
  S.topics.forEach(top => {
    top.entries.forEach(e => {
      if(isoYMD(e.date) === SEL_DATE && isoYMD(e.date) <= todayYMD && (!SEARCH || e.text.toLowerCase().includes(SEARCH.toLowerCase()))) {
        list.push({...e, tn: top.name, ti: top.id});

  var cards = list.map((e, i) => `
    <div class="e-card ani d${Math.min(i+1,4)}" onclick="openEntry('${e.ti}','${e.id}')">

}

            list.push({...e, tn: top.name, ti: top.id});
          }

  var t = eid ? tp(eid) : null;
  var icons = Object.keys(IC).map(k => `<button class="ico-opt ${t&&t.icon===k?'sel':''}" onclick="selI(this,'${k}')">${ico(k)}</button>`).join('');
  openSh(`<div class="sheet-hd"><h3>${t?'Editar Cuaderno':'Nuevo Cuaderno'}</h3><button class="sheet-x" onclick="closeSh()">${X_SVG}</button></div>
    <div class="sheet-body">
      <div class="fld"><label class="fld-l">Título</label><input id="fN" class="fld-in" value="${esc(t?t.name:'')}"></div>
      <div class="fld"><label class="fld-l">Icono</label><div class="ico-grid">${icons}</div><input type="hidden" id="fI" value="${t?t.icon:'folder'}"></div>
      <div class="fld"><label class="fld-l">Etiquetas (separadas por coma)</label><input id="fS" class="fld-in" value="${t?(t.subsections||[]).join(','):''}"></div>
    </div>
    <div class="btn-row">${t?`<button class="btn btn-warn" onclick="delTopic('${t.id}')">Borrar</button>`:''}<button class="btn btn-fill" onclick="saveTopic('${eid||''}')">Guardar</button></div>`);
};

window.selI = function(el,k){
  document.querySelectorAll('.ico-opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel'); document.getElementById('fI').value = k;
};

window.saveTopic = function(eid){
  var name = document.getElementById('fN').value.trim();
  var ic = document.getElementById('fI').value;
  var subs = document.getElementById('fS').value.split(',').map(s=>s.trim()).filter(s=>s);
  if(!name) return;
  if(eid){ var t=tp(eid); t.name=name; t.icon=ic; t.subsections=subs; }
  else { S.topics.push({id:gid(),name:name,icon:ic,subsections:subs,entries:[]}); }
  sv(); closeSh(); render();
};

window.delTopic = function(i){
  openSh(`<div class="sheet-hd"><h3>¿Borrar cuaderno?</h3><button class="sheet-x" onclick="showTopicSh('${i}')">${X_SVG}</button></div>
    <div class="sheet-body"><p style="font-size:0.92rem;color:var(--text-2);line-height:1.5">Se eliminarán todas las notas. No se puede deshacer.</p></div>
    <div class="btn-row"><button class="btn btn-soft" onclick="showTopicSh('${i}')">Cancelar</button><button class="btn btn-warn" onclick="doDelTopic('${i}')">Borrar</button></div>`);
};

window.doDelTopic = function(i){
  S.topics = S.topics.filter(t=>t.id!==i);
  sv(); closeSh(); goHome(); toast('Eliminado');
};

function showEntrySh(tid){
  var t=tp(tid);
  var opts = (t.subsections||[]).map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
  openSh(`<div class="sheet-hd"><h3>Nueva nota</h3><button class="sheet-x" onclick="closeSh()">${X_SVG}</button></div>
    <div class="sheet-body">
      <div class="fld"><label class="fld-l">Fecha de aparición</label><input type="date" id="fED" class="fld-in" value="${isoYMD()}"></div>
      <div class="fld"><select id="fES" class="fld-sel"><option value="">Sin etiqueta</option>${opts}</select></div>
      <div class="fld"><textarea id="fET" class="fld-ta" placeholder="¿Qué quieres recordar?"></textarea></div>
      <div class="fld" style="display:flex; gap:10px;">
        <button class="photo-btn" onclick="document.getElementById('fEI').click()">${IMG_SVG} Foto</button>
        <button class="photo-btn" id="btnRec" onclick="toggleRec()">${MIC_SVG} Audio</button>
        <input type="file" id="fEI" accept="image/*" style="display:none" onchange="hImg(this)">
      </div>
      <div id="imgP"></div><div id="audP"></div>
    </div>
    <div class="btn-row"><button class="btn btn-fill" onclick="saveEntry('${tid}')">Guardar</button></div>`);
}

window.toggleRec = async function(){
  if(isRec){
    mediaRecorder.stop(); isRec=false;
    document.getElementById('btnRec').innerHTML = MIC_SVG + ' Audio';
    document.getElementById('btnRec').style.color = 'var(--text-2)';
    return;
  }
  try{
    var stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      var blob = new Blob(audioChunks, {type:'audio/mp4'});
      var r = new FileReader();
      r.onload = ev => {
        TAudio = ev.target.result;
        document.getElementById('audP').innerHTML = `<div class="ph-prev"><audio controls src="${TAudio}" style="width:100%;height:44px;margin-top:10px;border-radius:12px;"></audio><button class="ph-rm" onclick="clAud()">${X_SVG}</button></div>`;
      };
      r.readAsDataURL(blob);
      if(stream) stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start(); isRec=true;
    document.getElementById('btnRec').innerHTML = '■ Grabando...';
    document.getElementById('btnRec').style.color = 'var(--rose)';
  }catch(e){ toast('Sin acceso al micrófono'); }
};

window.hImg = function(inp){
  if(!inp.files[0]) return;
  compress(inp.files[0], b => {
    TI = b; document.getElementById('imgP').innerHTML = `<div class="ph-prev"><img src="${b}"><button class="ph-rm" onclick="clImg()">${X_SVG}</button></div>`;
  });
};
window.clImg = function(){ TI=null; document.getElementById('imgP').innerHTML=''; };
window.clAud = function(){ TAudio=null; document.getElementById('audP').innerHTML=''; };

window.saveEntry = async function(tid){
  var text = document.getElementById('fET').value.trim(), sub = document.getElementById('fES').value, date = document.getElementById('fED').value;
  if(!text && !TI && !TAudio) return;

  var saveDate = date ? new Date(date + 'T12:00:00').toISOString() : new Date().toISOString();

  tp(tid).entries.push({
    id:gid(), text:text, image:TI, audio:TAudio, subsection:sub, date:saveDate
  });
  sv(); closeSh(); render(); toast('Guardado');
};

window.openEntry = function(tid,eid){
  var t=tp(tid), e=t.entries.find(en=>en.id===eid);
  if(!e) return;
  
  openSh(`<div class="sheet-hd"><h3>Memoria</h3><button class="sheet-x" onclick="closeSh()">${X_SVG}</button></div>
    <div class="sheet-body">
    ${e.image?`<img src="${e.image}" class="rd-img">`:''}
    ${e.audio?`<audio controls src="${e.audio}" style="width:100%;height:44px;margin-bottom:20px;border-radius:12px;outline:none;"></audio>`:''}
    <span class="rd-date">${fDL(e.date)}</span>
    <div class="rd-body">${esc(e.text)}</div></div>
    <div class="btn-row"><button class="btn btn-soft" onclick="delEntry('${tid}','${eid}')">Borrar</button><button class="btn btn-fill" onclick="showEditEntry('${tid}','${eid}')">Editar</button></div>`);
};

window.showEditEntry = function(tid,eid){
  var t=tp(tid), e=t.entries.find(en=>en.id===eid);
  if(!e) return;
  TI = e.image || null; TAudio = e.audio || null;
  var opts = (t.subsections||[]).map(s => `<option value="${esc(s)}" ${e.subsection===s?'selected':''}>${esc(s)}</option>`).join('');
  var prevI = TI ? `<div class="ph-prev"><img src="${TI}"><button class="ph-rm" onclick="clImg()">${X_SVG}</button></div>` : '';
  var prevA = TAudio ? `<div class="ph-prev"><audio controls src="${TAudio}" style="width:100%;height:44px;margin-top:10px;border-radius:12px;"></audio><button class="ph-rm" onclick="clAud()">${X_SVG}</button></div>` : '';
  
  openSh(`<div class="sheet-hd"><h3>Editar nota</h3><button class="sheet-x" onclick="openEntry('${tid}','${eid}')">${BACK_SVG}</button></div>
    <div class="sheet-body">
      <div class="fld"><label class="fld-l">Fecha de aparición</label><input type="date" id="fED" class="fld-in" value="${isoYMD(e.date)}"></div>
      <div class="fld"><select id="fES" class="fld-sel"><option value="">Sin etiqueta</option>${opts}</select></div>
      <div class="fld"><textarea id="fET" class="fld-ta">${esc(e.text)}</textarea></div>
      <div class="fld" style="display:flex; gap:10px;">
        <button class="photo-btn" onclick="document.getElementById('fEI').click()">${IMG_SVG} Cambiar Foto</button>
        <button class="photo-btn" id="btnRec" onclick="toggleRec()">${MIC_SVG} Nuevo Audio</button>
        <input type="file" id="fEI" accept="image/*" style="display:none" onchange="hImg(this)">
      </div>
      <div id="imgP">${prevI}</div><div id="audP">${prevA}</div>
    </div>
    <div class="btn-row"><button class="btn btn-fill" onclick="updEntry('${tid}','${eid}')">Actualizar</button></div>`);
};

window.updEntry = async function(tid,eid){
  var text = document.getElementById('fET').value.trim(), sub = document.getElementById('fES').value, date = document.getElementById('fED').value;
  if(!text && !TI && !TAudio) return;

  var t=tp(tid), e=t.entries.find(en=>en.id===eid);
  if(!e) return;
  e.text = text; e.subsection = sub; e.image = TI; e.audio = TAudio;
  if(date) e.date = new Date(date + 'T12:00:00').toISOString();

  sv(); closeSh(); render(); toast('Actualizado');
};

window.delEntry = function(tid,eid){
  openSh(`<div class="sheet-hd"><h3>¿Borrar memoria?</h3><button class="sheet-x" onclick="openEntry('${tid}','${eid}')">${BACK_SVG}</button></div>
    <div class="sheet-body"><p style="font-size:0.92rem;color:var(--text-2);line-height:1.5">Esta nota se eliminará permanentemente.</p></div>
    <div class="btn-row"><button class="btn btn-soft" onclick="openEntry('${tid}','${eid}')">Cancelar</button><button class="btn btn-warn" onclick="doDelEntry('${tid}','${eid}')">Borrar</button></div>`);
};

window.doDelEntry = function(tid,eid){
  var t=tp(tid); t.entries = t.entries.filter(e=>e.id!==eid);
  sv(); closeSh(); render(); toast('Eliminada');
};

window.showExport = function(){
  var json=JSON.stringify(S,null,2), b=new Blob([json],{type:'application/json'}), a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download='nikki-backup.json'; a.click(); closeSh(); toast('Exportado');
};

window.showImport = function(){
  openSh('<div class="sheet-hd"><h3>Importar</h3><button class="sheet-x" onclick="showSettings()">'+BACK_SVG+'</button></div>'
    +'<div class="sheet-body"><div class="fld"><label class="fld-l">Archivo .json</label><input type="file" id="fIM" accept=".json" style="margin-top:8px"></div></div>'
    +'<div class="btn-row"><button class="btn btn-fill" onclick="doImp()">Restaurar</button></div>');
};

window.doImp = function(){
  var file=document.getElementById('fIM').files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d&&d.topics){ S=d; sv(); closeSh(); goHome(); toast('Restaurado'); }
      else { toast('Formato incorrecto'); }
    }catch(e){ toast('Error de formato'); }
  };
  r.readAsText(file);
};

// BOOT SECUENCIA Y MIGRACIÓN A INDEXEDDB
try { await initDB(); } catch(e) {}
if(db) {
  var idbData = await idbGet('store_S');
  if (idbData && idbData.topics) S = idbData;
  else {
    try { var lData = JSON.parse(localStorage.getItem(SK)); if(lData && lData.topics){ S = lData; idbPut('store_S', S); } } catch(e){}
  }
} else {
  try { var lData = JSON.parse(localStorage.getItem(SK)); if(lData && lData.topics) S = lData; } catch(e){}
}

var th = localStorage.getItem(TK); if(th==='dark') document.documentElement.setAttribute('data-theme','dark'); 
render();

})();
</script>
</body>
</html>
